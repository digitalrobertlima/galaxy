<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robert • Design de Ambientes</title>
    <!-- Fontes Premium de Alta Costura -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #060606;
            --bronze: #b59975;
            --concrete-grey: #2a2a2c;
            --oak-warm: #4a3b2c;
            --light-glow: rgba(255, 230, 180, 0.12);
            --text-light: #f5f5f7;
            --text-muted: #7e7e86;
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            
            /* Estado Dinâmico do Monolito */
            --monolith-bg: var(--concrete-grey);
            --monolith-glow: rgba(181, 153, 117, 0.15);
            --monolith-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            background-color: var(--bg-color);
            color: var(--text-light);
            font-family: var(--font-sans);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
        }

        /* Ruído de textura orgânica de fundo */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.015;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Gradiente de iluminação cênica de fundo */
        .ambient-light {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 35%, var(--monolith-glow) 0%, transparent 70%);
            z-index: 2;
            transition: background 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        /* Header Minimalista */
        header {
            position: absolute;
            top: 28px;
            left: 24px;
            right: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand {
            font-family: var(--font-serif);
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--text-light);
        }

        .status {
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--bronze);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status::before {
            content: '';
            width: 5px;
            height: 5px;
            background: var(--bronze);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--bronze);
        }

        /* Área do Simulador Central */
        main {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 100px 24px 40px 24px;
            position: relative;
            z-index: 10;
        }

        /* Zona de toque isolada para rotação 3D */
        .touch-zone {
            flex: 1;
            width: 100%;
            max-width: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Bloqueia o scroll nativo do celular ao arrastar */
        }

        .perspective {
            perspective: 1200px;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* O Monolito Espacial */
        .monolith {
            width: 220px;
            height: 340px;
            background: var(--monolith-bg);
            border: 1px solid var(--monolith-border);
            border-radius: 8px;
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.7),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
            transform-style: preserve-3d;
            transition: 
                transform 0.15s ease-out, 
                background 0.8s cubic-bezier(0.16, 1, 0.3, 1), 
                border-color 0.8s ease,
                box-shadow 0.8s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 32px 24px;
            overflow: hidden;
        }

        /* Efeito de Reflexo de Luz Especular (Lustre) */
        .monolith::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255, 255, 255, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 3;
        }

        /* Texturas sobrepostas dinamicamente */
        .texture-overlay {
            position: absolute;
            inset: 0;
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
            transition: background 0.8s ease, opacity 0.8s ease;
        }

        .monolith-header {
            z-index: 10;
            transform: translateZ(25px);
        }

        .monolith-header span {
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--bronze);
            font-weight: 600;
        }

        .monolith-body {
            z-index: 10;
            transform: translateZ(40px);
        }

        .monolith-body h2 {
            font-family: var(--font-serif);
            font-size: 2rem;
            font-weight: 300;
            line-height: 1.15;
            margin-bottom: 8px;
            color: var(--text-light);
            transition: color 0.5s ease;
        }

        .monolith-body p {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .monolith-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            transform: translateZ(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        .monolith-footer span {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        /* Painel de Controle de Materiais (Fácil alcance do polegar) */
        .control-deck {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Amostras de Materiais */
        .materials-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .material-button {
            background: rgba(20, 20, 22, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 12px 6px;
            font-family: var(--font-sans);
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }

        .material-button.active {
            border-color: var(--bronze);
            color: var(--text-light);
            background: rgba(181, 153, 117, 0.05);
            box-shadow: 0 4px 15px rgba(181, 153, 117, 0.1);
        }

        /* Botão de Fechamento Estratégico (WhatsApp) */
        .cta-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--text-light);
            color: var(--bg-color);
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-family: var(--font-sans);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .cta-button::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transform: skewX(-30deg);
            top: 0;
            left: -50px;
            transition: none;
        }

        .cta-button:active {
            transform: scale(0.97);
            background: var(--bronze);
            color: var(--text-light);
            box-shadow: 0 4px 15px rgba(181, 153, 117, 0.3);
        }

        .cta-button:active::after {
            left: 110%;
            transition: left 0.6s ease;
        }

        /* Feedback de Instabilidade/Movimento */
        .instruction {
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin-top: -10px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <!-- Luz de Fundo Reativa -->
    <div class="ambient-light" id="bg-light"></div>

    <!-- Header Fixo -->
    <header>
        <div class="brand">ROBERT</div>
        <div class="status">Simulador Tátil v1.0</div>
    </header>

    <main>
        
        <!-- Instrução Inicial -->
        <div class="instruction">Arraste para rotacionar o espaço</div>

        <!-- Área de Toque Tridimensional -->
        <div class="touch-zone" id="touch-area">
            <div class="perspective">
                <div class="monolith" id="space-monolith">
                    <!-- Camada de Textura Procedural -->
                    <div class="texture-overlay" id="monolith-texture"></div>

                    <div class="monolith-header">
                        <span id="monolith-tag">VOLUME ACÚSTICO</span>
                    </div>

                    <div class="monolith-body">
                        <h2 id="monolith-title">Concreto<br>Bruto.</h2>
                        <p id="monolith-desc">Superfícies monolíticas que trazem peso, verdade estrutural e solidez para a composição espacial.</p>
                    </div>

                    <div class="monolith-footer">
                        <span id="monolith-coord">S-01 // CORE</span>
                        <div class="status-dot"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Deck de Controle Inteligente -->
        <div class="control-deck">
            <!-- Amostras de Materiais -->
            <div class="materials-grid">
                <button class="material-button active" onclick="setMaterial('concreto')">Concreto</button>
                <button class="material-button" onclick="setMaterial('madeira')">Carvalho</button>
                <button class="material-button" onclick="setMaterial('luz')">Luz Cênica</button>
            </div>

            <!-- Botão WhatsApp Direto -->
            <!-- Note: Utilizando o telefone estratégico do usuário fornecido: 31982313684 -->
            <a href="https://wa.me/5531982313684?text=Olá%20Robert,%20interagi%20com%20o%20seu%20Simulador%20Tátil%20e%20gostaria%20de%20solicitar%20um%20diagnóstico%20estratégico%20para%20o%20meu%20espaço." class="cta-button" target="_blank">
                Solicitar Diagnóstico
            </a>
        </div>

    </main>

    <!-- Script de Física 3D e Transição de Materiais -->
    <script>
        const touchArea = document.getElementById('touch-area');
        const monolith = document.getElementById('space-monolith');
        const bgLight = document.getElementById('bg-light');
        
        // Elementos Dinâmicos do Monolito
        const mTexture = document.getElementById('monolith-texture');
        const mTag = document.getElementById('monolith-tag');
        const mTitle = document.getElementById('monolith-title');
        const mDesc = document.getElementById('monolith-desc');
        const mCoord = document.getElementById('monolith-coord');

        let isDragging = false;
        let startX = 0;
        let startY = 0;
        let currentRotX = 0;
        let currentRotY = 0;
        let targetRotX = 0;
        let targetRotY = 0;

        // FÍSICA TÁTIL E ROTAÇÃO (MOBILE-FIRST)
        touchArea.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            touchArea.setPointerCapture(e.pointerId);
        });

        touchArea.addEventListener('pointermove', (e) => {
            const rect = touchArea.getBoundingClientRect();
            
            // 1. Efeito de brilho especular que segue o toque
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            monolith.style.setProperty('--mx', `${mx}px`);
            monolith.style.setProperty('--my', `${my}px`);

            if (!isDragging) return;

            // 2. Rotação 3D do Monolito
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;

            // Mapeamento da força do arraste (limite confortável de rotação)
            targetRotY = currentRotY + (deltaX * 0.25);
            targetRotX = currentRotX - (deltaY * 0.25);

            // Trava para evitar rotações absurdas de cabeça para baixo
            targetRotX = Math.max(-40, Math.min(40, targetRotX));

            monolith.style.transform = `rotateX(${targetRotX}deg) rotateY(${targetRotY}deg)`;
        });

        touchArea.addEventListener('pointerup', (e) => {
            isDragging = false;
            // Salva o ângulo atual para o próximo movimento começar dele
            currentRotX = targetRotX;
            currentRotY = targetRotY;
        });

        // Retorno suave para o centro quando o dedo sai do quadrante do simulador
        touchArea.addEventListener('pointerleave', () => {
            if (!isDragging) {
                // Animação suave de volta para a posição frontal
                currentRotX = 0;
                currentRotY = 0;
                targetRotX = 0;
                targetRotY = 0;
                monolith.style.transform = 'rotateX(0deg) rotateY(0deg)';
            }
        });

        // BANCO DE MATERIAIS SENSORIAIS (Industrial Organic)
        const materials = {
            concreto: {
                tag: "VOLUME ACÚSTICO",
                title: "Concreto<br>Bruto.",
                desc: "Superfícies monolíticas que trazem peso, verdade estrutural e solidez para a composição espacial.",
                coord: "S-01 // CORE",
                bg: "#1e1e1f",
                border: "rgba(255, 255, 255, 0.08)",
                glow: "rgba(181, 153, 117, 0.08)",
                shadow: "0 40px 80px rgba(0, 0, 0, 0.7)",
                texture: "repeating-linear-gradient(45deg, rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 2px, transparent 2px, transparent 10px)"
            },
            madeira: {
                tag: "MÉTRICA ORGÂNICA",
                title: "Carvalho<br>Nobre.",
                desc: "O contraste térmico ideal. Texturas fibrosas que humanizam o ambiente através do toque e do calor visual.",
                coord: "S-02 // ORGANIC",
                bg: "#2b2015",
                border: "rgba(181, 153, 117, 0.2)",
                glow: "rgba(181, 153, 117, 0.18)",
                shadow: "0 40px 80px rgba(74, 59, 44, 0.3)",
                texture: "radial-gradient(ellipse at center, rgba(181, 153, 117, 0.1) 0%, transparent 80%)"
            },
            luz: {
                tag: "ATMOSFERA CÊNICA",
                title: "Luz<br>Direcionada.",
                desc: "A matéria invisível do design. Curadoria de sombras projetadas que esculpem volumes e geram mistério.",
                coord: "S-03 // ATMOS",
                bg: "#121214",
                border: "rgba(255, 215, 0, 0.3)",
                glow: "rgba(255, 200, 100, 0.25)",
                shadow: "0 0 50px rgba(181, 153, 117, 0.2)",
                texture: "linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%)"
            }
        };

        function setMaterial(type) {
            // Atualiza botões ativos
            document.querySelectorAll('.material-button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const m = materials[type];

            // Aplica transições estéticas no Monolito
            document.documentElement.style.setProperty('--monolith-bg', m.bg);
            document.documentElement.style.setProperty('--monolith-border', m.border);
            document.documentElement.style.setProperty('--monolith-glow', m.glow);
            
            monolith.style.boxShadow = m.shadow;
            mTexture.style.background = m.texture;

            // Transição de texto suave
            mTag.style.opacity = 0;
            mTitle.style.opacity = 0;
            mDesc.style.opacity = 0;
            mCoord.style.opacity = 0;

            setTimeout(() => {
                mTag.textContent = m.tag;
                mTitle.innerHTML = m.title;
                mDesc.textContent = m.desc;
                mCoord.textContent = m.coord;

                mTag.style.opacity = 1;
                mTitle.style.opacity = 1;
                mDesc.style.opacity = 1;
                mCoord.style.opacity = 1;
            }, 300);
        }
    </script>
</body>
</html>
